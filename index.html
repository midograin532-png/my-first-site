<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>ازرب احسب وقود</title>

<style>
body{
    background:#f0f8ff;
    font-family:Arial,sans-serif;
    text-align:center;
    margin-top:100px;
}

h1{
    color:#0066cc;
}

input{
    width:220px;
    padding:10px;
    margin:10px;
    border:2px solid #0066cc;
    border-radius:10px;
    font-size:16px;
}

button{
    background:#0066cc;
    color:white;
    border:none;
    padding:10px 20px;
    border-radius:10px;
    font-size:16px;
    cursor:pointer;
}

button:hover{
    background:#004c99;
}

#resultat{
    display:none;
    width:220px;
    margin:10px auto;
    padding:12px;
    background:white;
    border:2px solid #0066cc;
    border-radius:10px;
    color:green;
    font-size:20px;
    font-weight:bold;
}
</style>
</head>

<body>

<h1>ازرب احسب وقود</h1>

<input type="number" id="num1" placeholder="نيميروك زين  هههههه نقصر برك">

<br>

<input type="number" id="num2" placeholder="الرقم الثاني">

<br>

<button onclick="calculer()">عبز تسيل خيي ما تعبنيش</button>

<div id="resultat">النتيجة ستظهر هنا</div>

<script>
function calculer() {
    let a = Number(document.getElementById("num1").value);
    let b = Number(document.getElementById("num2").value);

    let resultat = a + b;

    document.getElementById("resultat").innerHTML =
        "هاك ازين " + resultat;

    document.getElementById("resultat").style.display = "block";
}
</script>

</body>
</html>
