<!DOCTYPE html>
<html>
    <body>
        <h1>ما نحسبش وبلع </h1>
        <input type="number" id="a" placeholder="اكتب قود هنا">
        <input type="number" id="b" placeholder="اوهنا نيميرو زاوج   زيد نيميروك">
        <button type="button" onclick="calc()">بشوي برك</button>
        <p id="result"></p>

        <script>
            function calc() {
                let a = Number(document.getElementById("a").value);
                let b = Number(document.getElementById("b").value);
                document.getElementById("result").innerText = "زيزيلطا احبيبي = " + (a + b);
            }
        </script>
    </body>
</html>
